<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Buddy - Shop Manager</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #fce4ec;
        text-align: center;
      }
      .navbar {
        background-color: #007bff;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar a {
        color: white;
        text-decoration: none;
        padding: 10px;
        margin: 0 5px;
        background: #0056b3;
        border-radius: 5px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 480px;
        margin: 20px auto;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }
      input,
      select,
      button {
        width: 92%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      .btn-add {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-deduct {
        background-color: #dc3545;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      .inventory-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      .action-btns button {
        width: auto;
        padding: 5px 10px;
        margin: 0 2px;
        font-size: 12px;
        cursor: pointer;
      }
      .btn-edit {
        background-color: #ffc107;
        color: black;
        border: 1px solid #e0a800;
      }
      .btn-del {
        background-color: #6c757d;
        color: white;
        border: none;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="navbar">
      <a href="/parent_dashboard">⬅️ Back to Dashboard</a>
      <span>Shop Manager: <strong>{{ session.name }}</strong></span>
      <a href="/logout" style="background: #dc3545">Logout</a>
    </div>

    <!-- Section 1: Add New Commodity -->
    <div class="card">
      <h2>🎁 Add New Reward</h2>
      <input
        type="text"
        id="itemName"
        placeholder="E.g., Chocolate, 30 min Gaming"
      />
      <input type="number" id="itemCost" placeholder="Cost in Points" />
      <button class="btn-add" onclick="addCommodity()">Add to Shop</button>
      <p id="addMsg" style="font-weight: bold"></p>
    </div>

    <!-- Section 2: Manage Existing Inventory -->
    <div class="card">
      <h2>📋 Current Inventory</h2>
      <div id="inventoryList" style="max-height: 250px; overflow-y: auto">
        <!-- Items loaded via JS -->
      </div>
    </div>

    <!-- Section 3: Deduct Points (Claim Reward) -->
    <div class="card">
      <h2>🧾 Deduct Points (Claim Reward)</h2>
      <p style="font-size: 14px; color: #666">
        Verify the student's name and class to deduct points.
      </p>
      <input type="text" id="studentName" placeholder="Student Name" />
      <select id="studentClass">
        <option value="" disabled selected>Student Class</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="5">Class 5</option>
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
      </select>
      <select id="commoditySelect">
        <option value="" disabled selected>Loading items...</option>
      </select>
      <button class="btn-deduct" onclick="deductPoints()">
        Confirm & Deduct Points
      </button>
      <p id="deductMsg" style="font-weight: bold"></p>
    </div>

    <script>
      // Load inventory immediately on page load
      window.onload = loadData;

      async function loadData() {
        const response = await fetch("/api/commodities");
        const items = await response.json();

        const inventoryList = document.getElementById("inventoryList");
        const deductSelect = document.getElementById("commoditySelect");

        inventoryList.innerHTML = "";
        deductSelect.innerHTML =
          '<option value="" disabled selected>Select Reward to Claim</option>';

        if (items.length === 0) {
          inventoryList.innerHTML =
            '<p style="color:gray;">No rewards in the shop yet.</p>';
          return;
        }

        items.forEach((item) => {
          // Populate Dropdown
          deductSelect.innerHTML += `<option value="${item.cost}">${item.name} (${item.cost} pts)</option>`;

          // Populate Inventory List
          inventoryList.innerHTML += `
                    <div class="inventory-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>${item.cost} Points</small>
                        </div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="updateItem(${item.id}, '${item.name}', ${item.cost})">✏️ Edit</button>
                            <button class="btn-del" onclick="deleteItem(${item.id})">❌</button>
                        </div>
                    </div>
                `;
        });
      }

      async function addCommodity() {
        const name = document.getElementById("itemName").value;
        const cost = document.getElementById("itemCost").value;
        if (!name || !cost) return;

        const response = await fetch("/api/add_commodity", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, cost }),
        });
        const result = await response.json();

        const msg = document.getElementById("addMsg");
        msg.innerText = result.message;
        msg.style.color = result.success ? "green" : "red";

        if (result.success) {
          document.getElementById("itemName").value = "";
          document.getElementById("itemCost").value = "";
          loadData();
        }
      }

      async function deleteItem(id) {
        if (confirm("Are you sure you want to remove this reward?")) {
          await fetch(`/api/delete_commodity/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      async function updateItem(id, name, currentCost) {
        const newCost = prompt(`New point cost for '${name}':`, currentCost);
        if (newCost !== null && newCost !== "") {
          await fetch("/api/update_commodity", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id, cost: newCost }),
          });
          loadData();
        }
      }

      async function deductPoints() {
        const studentName = document.getElementById("studentName").value;
        const studentClass = document.getElementById("studentClass").value;
        const cost = document.getElementById("commoditySelect").value;

        if (!studentName || !studentClass || !cost) {
          document.getElementById("deductMsg").innerText =
            "Please select a student, class, and reward!";
          document.getElementById("deductMsg").style.color = "red";
          return;
        }

        const response = await fetch("/api/parent_redeem", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            student_name: studentName,
            grade_class: studentClass,
            cost: cost,
          }),
        });
        const result = await response.json();

        const msg = document.getElementById("deductMsg");
        msg.innerText = result.message;
        msg.style.color = result.success ? "green" : "red";
      }
    </script>
  </body>
</html>

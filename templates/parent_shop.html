<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Manager | Study Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <nav class="bg-slate-800 text-white p-4 shadow-md">
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <a
          href="/parent_dashboard"
          class="flex items-center gap-2 hover:text-blue-400 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
              clip-rule="evenodd"
            />
          </svg>
          <span class="font-bold text-sm">Back to Admin</span>
        </a>
        <span class="font-bold">🛍️ Shop & Points Manager</span>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 grid md:grid-cols-2 gap-8">
      <!-- Left Column: Inventory -->
      <div class="space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <h3
            class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"
          >
            🎁 Add New Reward
          </h3>
          <div class="space-y-3">
            <input
              type="text"
              id="itemName"
              placeholder="Reward Name (e.g. Ice Cream)"
              class="w-full p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500"
            />
            <input
              type="number"
              id="itemCost"
              placeholder="Point Cost"
              class="w-full p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500"
            />
            <button
              onclick="addCommodity()"
              class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all"
            >
              Add to Store
            </button>
            <p id="addMsg" class="text-sm text-center font-bold"></p>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="text-xl font-bold text-slate-800 mb-4">
            Current Inventory
          </h3>
          <div
            id="inventoryList"
            class="space-y-3 max-height-[400px] overflow-y-auto"
          >
            <!-- Items -->
          </div>
        </div>
      </div>

      <!-- Right Column: Redemptions -->
      <div
        class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit sticky top-6"
      >
        <h3
          class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"
        >
          🧾 Approve Redemption
        </h3>
        <p class="text-slate-500 text-sm mb-6">
          When a student wants to buy an item, use this to deduct their points.
        </p>

        <div class="space-y-4">
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase ml-1"
              >Student Details</label
            >
            <div class="flex gap-2">
              <input
                type="text"
                id="studentName"
                placeholder="Name"
                class="w-2/3 p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"
              />
              <select
                id="studentClass"
                class="w-1/3 p-3 rounded-lg border border-slate-200 outline-none bg-slate-50"
              >
                <option value="1">C-1</option>
                <option value="2">C-2</option>
                <option value="3">C-3</option>
                <option value="4">C-4</option>
                <option value="5">C-5</option>
                <option value="6">C-6</option>
                <option value="7">C-7</option>
                <option value="8">C-8</option>
              </select>
            </div>
          </div>

          <div>
            <label class="text-xs font-bold text-slate-400 uppercase ml-1"
              >Select Reward</label
            >
            <select
              id="commoditySelect"
              class="w-full p-3 rounded-lg border border-slate-200 outline-none bg-slate-50"
            >
              <!-- Loaded via JS -->
            </select>
          </div>

          <button
            onclick="deductPoints()"
            class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 shadow-lg transition-all active:scale-95"
          >
            CONFIRM PURCHASE ✅
          </button>
          <p id="deductMsg" class="text-sm text-center font-bold"></p>
        </div>
      </div>
    </main>

    <script>
      window.onload = loadData;

      async function loadData() {
        const response = await fetch("/api/commodities");
        const items = await response.json();
        const inventoryList = document.getElementById("inventoryList");
        const deductSelect = document.getElementById("commoditySelect");

        inventoryList.innerHTML = "";
        deductSelect.innerHTML =
          '<option value="" disabled selected>Select Item</option>';

        items.forEach((item) => {
          deductSelect.innerHTML += `<option value="${item.cost}">${item.name} (${item.cost} pts)</option>`;
          inventoryList.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <div>
                            <p class="font-bold text-slate-800">${item.name}</p>
                            <p class="text-sm text-blue-600 font-bold">${item.cost} Points</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="deleteItem(${item.id})" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                    </div>`;
        });
      }

      async function addCommodity() {
        const name = document.getElementById("itemName").value;
        const cost = document.getElementById("itemCost").value;
        if (!name || !cost) return;

        const response = await fetch("/api/add_commodity", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, cost }),
        });
        const result = await response.json();

        const msg = document.getElementById("addMsg");
        msg.innerText = result.message;
        msg.className = `text-sm text-center font-bold ${result.success ? "text-green-600" : "text-red-600"}`;

        if (result.success) {
          document.getElementById("itemName").value = "";
          document.getElementById("itemCost").value = "";
          loadData();
        }
      }

      async function deleteItem(id) {
        if (confirm("Remove item from shop?")) {
          await fetch(`/api/delete_commodity/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      async function deductPoints() {
        const studentName = document.getElementById("studentName").value;
        const studentClass = document.getElementById("studentClass").value;
        const cost = document.getElementById("commoditySelect").value;

        const response = await fetch("/api/parent_redeem", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            student_name: studentName,
            grade_class: studentClass,
            cost: cost,
          }),
        });
        const result = await response.json();

        const msg = document.getElementById("deductMsg");
        msg.innerText = result.message;
        msg.className = `text-sm text-center font-bold ${result.success ? "text-green-600" : "text-red-600"}`;
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Buddy - Rewards Shop</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #e8f5e9;
        text-align: center;
      }
      .navbar {
        background-color: #343a40;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar a {
        color: white;
        text-decoration: none;
        padding: 10px;
        margin: 0 5px;
        background: #495057;
        border-radius: 5px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 450px;
        margin: 30px auto;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }
      .point-display {
        color: #28a745;
        font-size: 24px;
        margin: 10px 0;
      }
      .store-item {
        border: 2px dashed #28a745;
        padding: 15px;
        margin: 15px 0;
        border-radius: 8px;
        background-color: #fafafa;
        text-align: left;
      }
      .store-item h4 {
        margin: 0;
        color: #333;
      }
      .store-item p {
        margin: 5px 0;
        color: #666;
        font-weight: bold;
      }
      .info-text {
        color: #6c757d;
        font-size: 14px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="navbar">
      <a href="/student_dashboard">⬅️ Back to Dashboard</a>
      <span>Logged in as: <strong>{{ session.name }}</strong></span>
      <a href="/logout" style="background: #dc3545">Logout</a>
    </div>

    <div class="card">
      <h2>🛍️ Rewards Shop</h2>

      <div class="point-display">
        My Balance: <span id="pointBalance">...</span> 🌟
      </div>

      <p class="info-text">
        Below are the rewards your parents have added. <br />
        <strong
          >To claim an item, please show your points to your parent!</strong
        >
      </p>

      <hr />

      <div id="itemList">
        <p style="color: gray">Loading rewards list...</p>
      </div>
    </div>

    <script>
      // Use Session variables from Flask
      const STUDENT_NAME = "{{ session.name }}";
      const GRADE_CLASS = "{{ session.grade_class }}";

      // Run this immediately when the page loads
      window.onload = async function () {
        loadShopData();
      };

      async function loadShopData() {
        // 1. Fetch Student Balance
        try {
          const balanceRes = await fetch(
            `/api/balance?name=${STUDENT_NAME}&grade=${GRADE_CLASS}`,
          );
          if (balanceRes.ok) {
            const balanceData = await balanceRes.json();
            document.getElementById("pointBalance").innerText =
              balanceData.points;
          }
        } catch (err) {
          console.error("Error fetching balance:", err);
        }

        // 2. Fetch Available Commodities
        try {
          const itemRes = await fetch("/api/commodities");
          const items = await itemRes.json();

          const itemList = document.getElementById("itemList");
          itemList.innerHTML = "";

          if (items.length === 0) {
            itemList.innerHTML =
              "<p style='color:gray;'>Your parents haven't added any rewards yet.</p>";
            return;
          }

          items.forEach((item) => {
            itemList.innerHTML += `
                    <div class="store-item">
                        <h4>🎁 ${item.name}</h4>
                        <p>Cost: ${item.cost} Points</p>
                    </div>`;
          });
        } catch (err) {
          console.error("Error fetching items:", err);
          document.getElementById("itemList").innerText =
            "Failed to load rewards.";
        }
      }
    </script>
  </body>
</html>

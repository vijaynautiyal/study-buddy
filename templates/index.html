<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Welcome to Study Buddy</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #f4f4f9;
        margin: 0;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        margin: 0 auto;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #333;
        margin-bottom: 20px;
      }
      input,
      select,
      button {
        width: 95%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 15px;
        box-sizing: border-box;
      }
      button {
        background-color: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      button:hover {
        background-color: #218838;
      }
      .toggle-link {
        color: #007bff;
        cursor: pointer;
        text-decoration: underline;
        font-size: 14px;
        display: block;
        margin-top: 15px;
      }
      .hidden {
        display: none;
      }
      #message {
        font-weight: bold;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <h1>🎓 Study Buddy</h1>
    <p>Master your subjects, earn your rewards.</p>

    <div class="card">
      <!-- Dynamic Header -->
      <h2 id="formTitle">Secure Login</h2>

      <form id="authForm">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="password" id="password" placeholder="Password" required />

        <select id="role" required>
          <option value="" disabled selected>Who are you?</option>
          <option value="Student">I am a Student</option>
          <option value="Parent">I am a Parent</option>
        </select>

        <select id="grade" class="hidden">
          <option value="" disabled selected>Select your Class</option>
          <option value="1">Class 1</option>
          <option value="2">Class 2</option>
          <option value="3">Class 3</option>
          <option value="4">Class 4</option>
          <option value="5">Class 5</option>
          <option value="6">Class 6</option>
          <option value="7">Class 7</option>
          <option value="8">Class 8</option>
        </select>

        <button type="submit" id="submitBtn">Login</button>
      </form>

      <p id="message"></p>

      <!-- Toggle between Login and Signup -->
      <span class="toggle-link" id="toggleLink" onclick="toggleMode()"
        >Don't have an account? Sign Up here.</span
      >
    </div>

    <script>
      let isLoginMode = true;
      const formTitle = document.getElementById("formTitle");
      const submitBtn = document.getElementById("submitBtn");
      const toggleLink = document.getElementById("toggleLink");
      const roleSelect = document.getElementById("role");
      const gradeSelect = document.getElementById("grade");

      // Show/Hide Grade selector for Students
      roleSelect.addEventListener("change", function () {
        if (this.value === "Student") {
          gradeSelect.classList.remove("hidden");
          gradeSelect.required = true;
        } else {
          gradeSelect.classList.add("hidden");
          gradeSelect.required = false;
        }
      });

      // Switch between Login and Signup
      function toggleMode() {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
          formTitle.innerText = "Secure Login";
          submitBtn.innerText = "Login";
          toggleLink.innerText = "Don't have an account? Sign Up here.";
        } else {
          formTitle.innerText = "Join Study Buddy";
          submitBtn.innerText = "Create Account";
          toggleLink.innerText = "Already have an account? Login here.";
        }
        document.getElementById("message").innerText = "";
      }

      document
        .getElementById("authForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const msgEl = document.getElementById("message");
          msgEl.innerText = "Processing...";
          msgEl.style.color = "gray";

          const payload = {
            name: document.getElementById("name").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            grade_class: document.getElementById("grade").value || null,
          };

          // Decide which API to call based on the mode
          const endpoint = isLoginMode ? "/api/login" : "/api/register";

          try {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (response.ok && result.success) {
              msgEl.innerText = "Success! Redirecting...";
              msgEl.style.color = "green";
              // Whisks the user to the dashboard Python told us about!
              window.location.href = result.redirect;
            } else {
              msgEl.innerText = result.message || "Error occurred.";
              msgEl.style.color = "red";
            }
          } catch (error) {
            msgEl.innerText = "Connection failed!";
            msgEl.style.color = "red";
          }
        });
    </script>
  </body>
</html>

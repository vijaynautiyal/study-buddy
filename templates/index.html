<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Buddy | Welcome</title>
    <!-- The Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="max-w-md w-full bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 transform transition-all hover:scale-[1.01]"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <h1
          class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2"
        >
          🎓 Study Buddy
        </h1>
        <p class="text-gray-500 font-medium">
          Master your subjects, earn your rewards.
        </p>
      </div>

      <h2
        id="formTitle"
        class="text-2xl font-bold text-gray-800 mb-6 text-center"
      >
        Secure Login
      </h2>

      <form id="authForm" class="space-y-4">
        <div>
          <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all"
          />
        </div>

        <div>
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all"
          />
        </div>

        <div class="grid grid-cols-1 gap-4">
          <select
            id="role"
            required
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 outline-none bg-white cursor-pointer"
          >
            <option value="" disabled selected>Who are you?</option>
            <option value="Student">I am a Student</option>
            <option value="Parent">I am a Parent</option>
          </select>

          <select
            id="grade"
            class="hidden w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 outline-none bg-white"
          >
            <option value="" disabled selected>Select your Class</option>
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="3">Class 3</option>
            <option value="4">Class 4</option>
            <option value="5">Class 5</option>
            <option value="6">Class 6</option>
            <option value="7">Class 7</option>
            <option value="8">Class 8</option>
          </select>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-indigo-500/50 transition-all active:scale-95"
        >
          Login
        </button>
      </form>

      <p id="message" class="mt-4 text-center font-semibold text-sm"></p>

      <button
        id="toggleLink"
        onclick="toggleMode()"
        class="w-full mt-6 text-indigo-600 hover:text-indigo-800 text-sm font-semibold underline underline-offset-4"
      >
        Don't have an account? Sign Up here.
      </button>
    </div>

    <script>
      let isLoginMode = true;
      const formTitle = document.getElementById("formTitle");
      const submitBtn = document.getElementById("submitBtn");
      const toggleLink = document.getElementById("toggleLink");
      const roleSelect = document.getElementById("role");
      const gradeSelect = document.getElementById("grade");

      roleSelect.addEventListener("change", function () {
        if (this.value === "Student") {
          gradeSelect.classList.remove("hidden");
          gradeSelect.required = true;
        } else {
          gradeSelect.classList.add("hidden");
          gradeSelect.required = false;
        }
      });

      function toggleMode() {
        isLoginMode = !isLoginMode;
        formTitle.innerText = isLoginMode ? "Secure Login" : "Join Study Buddy";
        submitBtn.innerText = isLoginMode ? "Login" : "Create Account";
        toggleLink.innerText = isLoginMode
          ? "Don't have an account? Sign Up here."
          : "Already have an account? Login here.";
        document.getElementById("message").innerText = "";
      }

      document
        .getElementById("authForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const msgEl = document.getElementById("message");
          msgEl.innerText = "Processing...";
          msgEl.className =
            "mt-4 text-center text-gray-500 font-semibold text-sm";

          const payload = {
            name: document.getElementById("name").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            grade_class: document.getElementById("grade").value || null,
          };

          const endpoint = isLoginMode ? "/api/login" : "/api/register";

          try {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const result = await response.json();

            if (response.ok && result.success) {
              msgEl.innerText = "Success! Redirecting...";
              msgEl.className =
                "mt-4 text-center text-green-600 font-semibold text-sm";
              window.location.href = result.redirect;
            } else {
              msgEl.innerText = result.message || "Error occurred.";
              msgEl.className =
                "mt-4 text-center text-red-600 font-semibold text-sm";
            }
          } catch (error) {
            msgEl.innerText = "Connection failed!";
            msgEl.className =
              "mt-4 text-center text-red-600 font-semibold text-sm";
          }
        });
    </script>
  </body>
</html>

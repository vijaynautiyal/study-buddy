<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Buddy - Quiz Arena</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #fff3cd;
        text-align: center;
      }
      .navbar {
        background-color: #343a40;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar a {
        color: white;
        text-decoration: none;
        padding: 10px;
        margin: 0 5px;
        background: #495057;
        border-radius: 5px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 450px;
        margin: 30px auto;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }
      select,
      button {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }
      .start-btn {
        background-color: #ffc107;
        color: black;
        font-weight: bold;
        cursor: pointer;
        border: none;
      }
      .option-btn {
        background-color: #17a2b8;
        color: white;
        display: block;
        margin: 8px auto;
        width: 95%;
        cursor: pointer;
      }
      .option-btn:hover {
        background-color: #138496;
      }
      .hidden {
        display: none;
      }
      #quizArea {
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 20px;
      }
      .result {
        font-weight: bold;
        font-size: 20px;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="navbar">
      <a href="/student_dashboard">⬅️ Back to Dashboard</a>
      <span
        >Logged in as: <strong>{{ session.name }}</strong> (Class {{
        session.grade_class }})</span
      >
      <a href="/logout" style="background: #dc3545">Logout</a>
    </div>

    <div class="card">
      <h2>🎮 Quiz Arena</h2>

      <!-- Setup Area (No login needed anymore!) -->
      <div id="setupArea">
        <p>Select a subject to start your challenge:</p>
        <select id="subjectSelect">
          <option value="" disabled selected>Loading subjects...</option>
        </select>
        <button class="start-btn" onclick="startQuiz()">Start Playing!</button>
        <p id="setupMessage" style="color: red"></p>
      </div>

      <!-- The Quiz Engine -->
      <div id="quizArea" class="hidden">
        <h3 id="questionText">Loading...</h3>

        <button class="option-btn" onclick="submitAnswer('A')" id="btnA">
          A
        </button>
        <button class="option-btn" onclick="submitAnswer('B')" id="btnB">
          B
        </button>
        <button class="option-btn" onclick="submitAnswer('C')" id="btnC">
          C
        </button>
        <button class="option-btn" onclick="submitAnswer('D')" id="btnD">
          D
        </button>

        <p id="resultMessage" class="result"></p>
        <button
          onclick="startQuiz()"
          id="nextBtn"
          class="hidden"
          style="background-color: #28a745; color: white; border: none"
        >
          Next Question ➡️
        </button>
      </div>
    </div>

    <script>
      // Magic Session Data from Python
      const STUDENT_NAME = "{{ session.name }}";
      const GRADE_CLASS = "{{ session.grade_class }}";

      let currentQuestionId = null;

      // Automatically load subjects for the student's class on page load
      window.onload = async function () {
        const response = await fetch(`/api/subjects/${GRADE_CLASS}`);
        const subjects = await response.json();
        const select = document.getElementById("subjectSelect");

        select.innerHTML =
          '<option value="" disabled selected>Choose a Subject</option>';
        subjects.forEach((sub) => {
          select.innerHTML += `<option value="${sub.name}">${sub.name}</option>`;
        });
      };

      async function startQuiz() {
        const subject = document.getElementById("subjectSelect").value;
        if (!subject) {
          document.getElementById("setupMessage").innerText =
            "Please pick a subject first!";
          return;
        }

        // Fetch a random question for this Class and Subject
        const response = await fetch(
          `/api/get_question?grade_class=${GRADE_CLASS}&subject=${subject}`,
        );
        const questionData = await response.json();

        if (response.status === 404) {
          document.getElementById("setupMessage").innerText =
            "No questions found for this subject yet!";
          return;
        }

        // UI Transitions
        document.getElementById("setupArea").classList.add("hidden");
        document.getElementById("quizArea").classList.remove("hidden");
        document.getElementById("nextBtn").classList.add("hidden");
        document.getElementById("resultMessage").innerText = "";

        // Populate Question Data
        currentQuestionId = questionData.id;
        document.getElementById("questionText").innerText =
          questionData.question_text;
        document.getElementById("btnA").innerText =
          "A) " + questionData.option_a;
        document.getElementById("btnB").innerText =
          "B) " + questionData.option_b;
        document.getElementById("btnC").innerText =
          "C) " + questionData.option_c;
        document.getElementById("btnD").innerText =
          "D) " + questionData.option_d;
      }

      async function submitAnswer(selectedOption) {
        const payload = {
          student_name: STUDENT_NAME,
          question_id: currentQuestionId,
          selected_option: selectedOption,
        };

        const response = await fetch("/api/check_answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        const msgElement = document.getElementById("resultMessage");

        msgElement.innerText = result.message;
        msgElement.style.color = result.correct ? "green" : "red";

        // Show 'Next' button after answering
        document.getElementById("nextBtn").classList.remove("hidden");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Arena | Study Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-amber-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-slate-800 text-white p-4 shadow-md">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <a
          href="/student_dashboard"
          class="flex items-center gap-2 hover:text-amber-400 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
              clip-rule="evenodd"
            />
          </svg>
          <span class="font-bold">Dashboard</span>
        </a>
        <span class="text-sm opacity-80"
          >Class {{ session.grade_class }} |
          <strong>{{ session.name }}</strong></span
        >
      </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 mt-6">
      <div
        class="bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-white"
      >
        <!-- Header Section -->
        <div class="bg-amber-400 p-6 text-center">
          <h2
            class="text-2xl font-black text-amber-900 uppercase tracking-widest"
          >
            Quiz Arena 🎮
          </h2>
        </div>

        <div class="p-8">
          <!-- Step 1: Selection Area -->
          <div id="setupArea" class="space-y-6">
            <div class="text-center">
              <p class="text-slate-600 font-medium">
                Ready to test your knowledge?
              </p>
              <h3 class="text-xl font-bold text-slate-800 mt-1">
                Choose a Subject
              </h3>
            </div>

            <select
              id="subjectSelect"
              class="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-amber-400 outline-none text-lg font-semibold bg-slate-50 transition-all"
            >
              <option value="" disabled selected>Loading subjects...</option>
            </select>

            <button
              onclick="startQuiz()"
              class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl text-xl shadow-lg shadow-amber-200 transition-all active:scale-95"
            >
              START MISSION 🚀
            </button>
            <p id="setupMessage" class="text-center text-red-500 font-bold"></p>
          </div>

          <!-- Step 2: Quiz Area -->
          <div id="quizArea" class="hidden space-y-6">
            <div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-100">
              <h3
                id="questionText"
                class="text-xl font-bold text-slate-800 leading-relaxed"
              >
                Loading question...
              </h3>
            </div>

            <div class="grid gap-4">
              <button
                onclick="submitAnswer('A')"
                id="btnA"
                class="group flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left"
              >
                <span
                  class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg font-black text-slate-500 group-hover:bg-indigo-500 group-hover:text-white mr-4 transition-colors"
                  >A</span
                >
                <span class="font-bold text-slate-700">Option A</span>
              </button>
              <button
                onclick="submitAnswer('B')"
                id="btnB"
                class="group flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left"
              >
                <span
                  class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg font-black text-slate-500 group-hover:bg-indigo-500 group-hover:text-white mr-4 transition-colors"
                  >B</span
                >
                <span class="font-bold text-slate-700">Option B</span>
              </button>
              <button
                onclick="submitAnswer('C')"
                id="btnC"
                class="group flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left"
              >
                <span
                  class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg font-black text-slate-500 group-hover:bg-indigo-500 group-hover:text-white mr-4 transition-colors"
                  >C</span
                >
                <span class="font-bold text-slate-700">Option C</span>
              </button>
              <button
                onclick="submitAnswer('D')"
                id="btnD"
                class="group flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left"
              >
                <span
                  class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg font-black text-slate-500 group-hover:bg-indigo-500 group-hover:text-white mr-4 transition-colors"
                  >D</span
                >
                <span class="font-bold text-slate-700">Option D</span>
              </button>
            </div>

            <div
              id="resultBox"
              class="hidden p-4 rounded-xl text-center animate-bounce"
            >
              <p
                id="resultMessage"
                class="text-2xl font-black uppercase italic"
              ></p>
            </div>

            <button
              onclick="startQuiz()"
              id="nextBtn"
              class="hidden w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl text-lg shadow-lg shadow-emerald-200 transition-all"
            >
              NEXT QUESTION ➡️
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      const STUDENT_NAME = "{{ session.name }}";
      const GRADE_CLASS = "{{ session.grade_class }}";
      let currentQuestionId = null;

      window.onload = async function () {
        const response = await fetch(`/api/subjects/${GRADE_CLASS}`);
        const subjects = await response.json();
        const select = document.getElementById("subjectSelect");
        select.innerHTML =
          '<option value="" disabled selected>Select Subject</option>';
        subjects.forEach((sub) => {
          select.innerHTML += `<option value="${sub.name}">${sub.name}</option>`;
        });
      };

      async function startQuiz() {
        const subject = document.getElementById("subjectSelect").value;
        if (!subject) return;

        const response = await fetch(
          `/api/get_question?grade_class=${GRADE_CLASS}&subject=${subject}`,
        );
        const questionData = await response.json();

        if (response.status === 404) {
          document.getElementById("setupMessage").innerText =
            "No questions found for this subject!";
          return;
        }

        document.getElementById("setupArea").classList.add("hidden");
        document.getElementById("quizArea").classList.remove("hidden");
        document.getElementById("nextBtn").classList.add("hidden");
        document.getElementById("resultBox").classList.add("hidden");

        currentQuestionId = questionData.id;
        document.getElementById("questionText").innerText =
          questionData.question_text;
        document.getElementById("btnA").lastElementChild.innerText =
          questionData.option_a;
        document.getElementById("btnB").lastElementChild.innerText =
          questionData.option_b;
        document.getElementById("btnC").lastElementChild.innerText =
          questionData.option_c;
        document.getElementById("btnD").lastElementChild.innerText =
          questionData.option_d;
      }

      async function submitAnswer(selectedOption) {
        const response = await fetch("/api/check_answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            student_name: STUDENT_NAME,
            question_id: currentQuestionId,
            selected_option: selectedOption,
          }),
        });
        const result = await response.json();

        const resultBox = document.getElementById("resultBox");
        const resultMsg = document.getElementById("resultMessage");

        resultBox.classList.remove("hidden");
        resultMsg.innerText = result.message;

        if (result.correct) {
          resultBox.className =
            "p-4 rounded-xl text-center animate-bounce bg-emerald-100 text-emerald-700";
        } else {
          resultBox.className =
            "p-4 rounded-xl text-center animate-shake bg-red-100 text-red-700";
        }

        document.getElementById("nextBtn").classList.remove("hidden");
      }
    </script>
  </body>
</html>

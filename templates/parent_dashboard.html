<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Parent Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #e9ecef;
        text-align: center;
      }
      .navbar {
        background-color: #007bff;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar a {
        color: white;
        text-decoration: none;
        padding: 10px;
        margin: 0 5px;
        background: #0056b3;
        border-radius: 5px;
      }
      .navbar a.logout {
        background: #dc3545;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: 40px auto;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }
      .big-btn {
        display: block;
        width: 90%;
        padding: 15px;
        margin: 15px auto;
        background-color: #28a745;
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
      }
      .big-btn.shop {
        background-color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <h2>Study Buddy Control Panel</h2>
      <div>
        <span>Welcome, Parent {{ session.name }}</span>
        <a href="/logout" class="logout">Logout</a>
      </div>
    </div>

    <div class="card">
      <h2>Parent Dashboard</h2>
      <p>Select a tool to manage your student's journey.</p>
      <a href="/parent" class="big-btn">📚 Content & Quiz Manager</a>
      <a href="/parent_shop" class="big-btn shop"
        >🎁 Inventory & Rewards Manager</a
      >
    </div>
  </body>
</html>
